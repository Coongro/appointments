<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar turno — Mobile (375px)</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #F5A800; --gold-lt: #FFFBF0; --gold-hover: #E09800;
      --ink: #1A1916; --ink-2: #3A3731; --ink-3: #6B6760; --ink-4: #9B9893;
      --bg: #F6F5F1; --surface: #FFFFFF; --border: #E8E7E2; --border-md: #D4D3CC;
      --r-xl: 18px; --r-sm: 7px;
      --font-serif: 'Noto Serif JP', serif; --font-body: 'Roboto', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body); background: rgba(26,25,22,.42);
      backdrop-filter: blur(2px); color: var(--ink);
      display: flex; align-items: flex-end; justify-content: center;
      min-height: 100vh; width: 375px; margin: 0 auto;
    }

    .dialog {
      background: var(--surface); border-radius: var(--r-xl) var(--r-xl) 0 0;
      width: 100%; max-height: 92vh; overflow-y: auto;
      animation: slideUp 300ms cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .d-header {
      padding: 14px 16px 10px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--surface); z-index: 10;
      border-radius: var(--r-xl) var(--r-xl) 0 0;
    }
    .drag-handle {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      width: 36px; height: 4px; background: var(--border-md); border-radius: 2px;
    }
    .d-title { font-family: var(--font-serif); font-weight: 700; font-size: 17px; }
    .d-close {
      width: 26px; height: 26px; border: none; background: transparent;
      cursor: pointer; border-radius: 50%; color: var(--ink-3);
      display: flex; align-items: center; justify-content: center;
    }
    .d-close svg { width: 16px; height: 16px; }

    .d-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .sec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-4); margin-bottom: -6px; }

    .field { position: relative; }
    .f-label {
      position: absolute; top: 8px; left: 13px; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; color: var(--ink-4); z-index: 1; pointer-events: none;
    }
    .f-input {
      width: 100%; padding: 26px 13px 10px; font-size: 16px;
      font-family: var(--font-body); color: var(--ink);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); outline: none;
    }
    .f-input:focus { border-color: var(--gold); }
    .f-input::placeholder { color: var(--ink-4); }
    textarea.f-input { resize: vertical; min-height: 60px; }

    .f-picker {
      width: 100%; padding: 26px 13px 10px; font-size: 14px;
      font-family: var(--font-body); color: var(--ink);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); cursor: pointer;
      display: flex; align-items: center; gap: 10px; min-height: 56px;
    }
    .pk-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .pk-icon {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .pk-icon svg { width: 16px; height: 16px; }
    .pk-text { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .pk-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pk-sub { font-size: 11px; color: var(--ink-3); }
    .pk-chevron { color: var(--ink-4); flex-shrink: 0; }
    .pk-chevron svg { width: 14px; height: 14px; }

    .owner-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px; background: var(--bg); border-radius: var(--r-sm);
      font-size: 11px; color: var(--ink-3);
    }
    .owner-bar svg { width: 13px; height: 13px; color: var(--ink-4); flex-shrink: 0; }
    .owner-bar strong { color: var(--ink-2); font-weight: 500; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .f-select {
      width: 100%; padding: 26px 13px 10px; font-size: 14px;
      font-family: var(--font-body); color: var(--ink);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; min-height: 50px;
    }

    .d-footer {
      padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border); background: var(--bg);
      display: flex; gap: 8px; position: sticky; bottom: 0;
    }
    .btn {
      font-family: var(--font-body); font-weight: 700; font-size: 14px;
      padding: 12px 20px; border-radius: var(--r-sm); cursor: pointer;
      border: 1px solid transparent; flex: 1; text-align: center;
    }
    .btn-ghost { background: transparent; color: var(--ink-3); border-color: var(--border); }
    .btn-gold { background: var(--gold); color: white; border-color: var(--gold); }
  </style>
</head>
<body>

<div class="dialog">
  <div class="d-header">
    <div class="drag-handle"></div>
    <span class="d-title">Agendar turno</span>
    <button class="d-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  </div>

  <div class="d-body">

    <div class="sec">Paciente</div>
    <div class="field">
      <label class="f-label">Mascota</label>
      <div class="f-picker">
        <div class="pk-icon" style="background:#DBEAFE;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round"><path d="M10 5.172C10 3.782 8.423 2.679 6.5 3c-2.823.47-4.113 6.006-4 7 .137 1.217 1.5 2.5 3 2.5s2.529-.272 3.5-1.5M14 5.172C14 3.782 15.577 2.679 17.5 3c2.823.47 4.113 6.006 4 7-.137 1.217-1.5 2.5-3 2.5s-2.529-.272-3.5-1.5"/></svg>
        </div>
        <div class="pk-text">
          <span class="pk-name">Mia</span>
          <span class="pk-sub">Felino · Siamés · 2 años</span>
        </div>
        <span class="pk-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg></span>
      </div>
    </div>
    <div class="owner-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/></svg>
      Dueño: <strong>Ana Rodríguez</strong> · 11 5555-1234
    </div>

    <div class="sec">Veterinario</div>
    <div class="field">
      <label class="f-label">Profesional</label>
      <div class="f-picker">
        <div class="pk-avatar" style="background:#DCFCE7;color:#15803D;">SM</div>
        <div class="pk-text">
          <span class="pk-name">Dra. Sofía Martínez</span>
          <span class="pk-sub">Clínica general · MP 54321</span>
        </div>
        <span class="pk-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg></span>
      </div>
    </div>

    <div class="sec">Fecha y hora</div>
    <div class="field">
      <label class="f-label">Fecha</label>
      <div class="f-select">
        <span>07/04/2026</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>
    <div class="row-2">
      <div class="field">
        <label class="f-label">Inicio</label>
        <div class="f-select">
          <span>09:00</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>
      <div class="field">
        <label class="f-label">Fin</label>
        <div class="f-select">
          <span>09:30</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>
    </div>

    <div class="sec">Motivo</div>
    <div class="field">
      <label class="f-label">Categoría</label>
      <div class="f-select">
        <span>Vacunación</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink-4)" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
    </div>
    <div class="field">
      <label class="f-label">Detalle (opcional)</label>
      <input type="text" class="f-input" value="Triple felina" placeholder="Ej: Refuerzo antirrábica">
    </div>

    <div class="field">
      <label class="f-label">Notas (opcional)</label>
      <textarea class="f-input" placeholder="Observaciones...">Traer libreta sanitaria.</textarea>
    </div>

  </div>

  <div class="d-footer">
    <button class="btn btn-ghost">Cancelar</button>
    <button class="btn btn-gold">Agendar</button>
  </div>
</div>

</body>
</html>
